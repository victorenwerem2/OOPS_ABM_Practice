<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Addition Practice</title>
</head>
<body>

  <div style="max-width: 480px; margin: 2rem auto; text-align: center; font-family: sans-serif;">

    <p style="font-size: 13px; color: gray; text-transform: uppercase; letter-spacing: 0.05em;">Addition Practice</p>

    <div style="font-size: 48px; margin: 1.5rem 0;">
      <span id="num1">12</span> + <span id="num2">7</span> = ?
    </div>

    <input type="number" id="answer" placeholder="Your answer"
      style="font-size: 24px; width: 160px; text-align: center; padding: 8px;"
      onkeydown="if(event.key==='Enter') checkAnswer()" />

    <br><br>
    <button onclick="checkAnswer()">Check</button>
    <button onclick="newQuestion()">New Question</button>

    <p id="feedback" style="font-size: 18px; font-weight: bold; min-height: 28px;"></p>

    <p>✅ Correct: <span id="correct">0</span> &nbsp; ❌ Wrong: <span id="wrong">0</span> &nbsp; 🔥 Streak: <span id="streak">0</span></p>

    <label>Difficulty:
      <select id="difficulty" onchange="newQuestion()">
        <option value="easy">Easy (1–20)</option>
        <option value="medium" selected>Medium (1–100)</option>
        <option value="hard">Hard (1–999)</option>
      </select>
    </label>
  </div>

  <script>
    let correctCount = 0, wrongCount = 0, streak = 0;
    let a = 12, b = 7;

    function getRange() {
      const d = document.getElementById('difficulty').value;
      if (d === 'easy') return 20;
      if (d === 'hard') return 999;
      return 100;
    }

    function newQuestion() {
      const max = getRange();
      a = Math.floor(Math.random() * max) + 1;
      b = Math.floor(Math.random() * max) + 1;
      document.getElementById('num1').textContent = a;
      document.getElementById('num2').textContent = b;
      document.getElementById('answer').value = '';
      document.getElementById('feedback').textContent = '';
      document.getElementById('answer').focus();
    }

    function checkAnswer() {
      const input = document.getElementById('answer').value.trim();
      if (input === '') return;
      const userAnswer = parseInt(input);
      const correct = a + b;
      const fb = document.getElementById('feedback');
      if (userAnswer === correct) {
        correctCount++;
        streak++;
        fb.style.color = 'green';
        fb.textContent = '✓ Correct!';
        setTimeout(newQuestion, 900);
      } else {
        wrongCount++;
        streak = 0;
        fb.style.color = 'red';
        fb.textContent = `✗ Wrong! The answer is ${correct}`;
      }
      document.getElementById('correct').textContent = correctCount;
      document.getElementById('wrong').textContent = wrongCount;
      document.getElementById('streak').textContent = streak;
    }

    document.getElementById('answer').focus();
  </script>

</body>
</html>
